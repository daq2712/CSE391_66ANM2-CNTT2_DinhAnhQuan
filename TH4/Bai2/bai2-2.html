<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Form Đặt Hàng</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 700px;
      margin: 30px auto;
    }

    .form-group {
      margin-bottom: 15px;
    }

    input, select, textarea {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
    }

    .error {
      color: red;
      font-size: 14px;
      display: block;
      margin-top: 4px;
    }

    .counter {
      font-size: 14px;
      text-align: right;
    }

    .summary {
      border: 1px solid #ccc;
      padding: 15px;
      margin-top: 20px;
      display: none;
      background-color: #f8f9fa;
    }

    .success {
      color: green;
      font-weight: bold;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Form Đặt Hàng</h1>

  <form id="orderForm">
    <div class="form-group">
      <label>Tên sản phẩm</label>
      <select id="product">
        <option value="">-- Chọn sản phẩm --</option>
        <option value="Áo">Áo</option>
        <option value="Quần">Quần</option>
        <option value="Giày">Giày</option>
      </select>
      <span class="error" id="productError"></span>
    </div>

    <div class="form-group">
      <label>Số lượng</label>
      <input type="number" id="quantity" min="1" max="99">
      <span class="error" id="quantityError"></span>
    </div>

    <div class="form-group">
      <label>Ngày giao hàng</label>
      <input type="date" id="deliveryDate">
      <span class="error" id="deliveryDateError"></span>
    </div>

    <div class="form-group">
      <label>Địa chỉ giao hàng</label>
      <input type="text" id="address">
      <span class="error" id="addressError"></span>
    </div>

    <div class="form-group">
      <label>Ghi chú</label>
      <textarea id="note" rows="4"></textarea>
      <div class="counter" id="noteCounter">0/200</div>
      <span class="error" id="noteError"></span>
    </div>

    <div class="form-group">
      <label>Phương thức thanh toán</label><br>
      <input type="radio" name="payment" value="COD"> COD
      <input type="radio" name="payment" value="Chuyển khoản"> Chuyển khoản
      <input type="radio" name="payment" value="Ví điện tử"> Ví điện tử
      <span class="error" id="paymentError"></span>
    </div>

    <div class="form-group">
      <strong>Tổng tiền: <span id="totalPrice">0</span> VNĐ</strong>
    </div>

    <button type="submit">Đặt hàng</button>
  </form>

  <div class="summary" id="summaryBox">
    <h3>Xác nhận đặt hàng</h3>
    <div id="summaryContent"></div>
    <button id="confirmBtn">Xác nhận</button>
    <button id="cancelBtn">Hủy</button>
  </div>

  <div class="success" id="successMessage"></div>

  <script src="bai2-2.js"></script>
</body>
</html>
