<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tìm kiếm và lọc sinh viên</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
    }

    input, select, button {
      padding: 8px 10px;
      margin: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th.sortable {
      cursor: pointer;
      user-select: none;
    }

    .weak {
      background-color: #fff3cd;
    }

    .delete-btn {
      background: crimson;
      color: white;
      border: none;
      padding: 6px 10px;
      cursor: pointer;
    }

    #noResult {
      margin-top: 15px;
      color: red;
      font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>
  <h1>Quản Lý Điểm Sinh Viên</h1>

  <div>
    <input type="text" id="fullname" placeholder="Họ tên">
    <input type="number" id="score" placeholder="Điểm" min="0" max="10" step="0.1">
    <button id="addBtn">Thêm</button>
  </div>

  <div style="margin-top: 15px;">
    <input type="text" id="searchInput" placeholder="Tìm kiếm theo tên...">
    <select id="filterRank">
      <option value="Tất cả">Tất cả</option>
      <option value="Giỏi">Giỏi</option>
      <option value="Khá">Khá</option>
      <option value="Trung bình">Trung bình</option>
      <option value="Yếu">Yếu</option>
    </select>
  </div>

  <table>
    <thead>
      <tr>
        <th>STT</th>
        <th>Họ tên</th>
        <th class="sortable" id="scoreHeader">Điểm</th>
        <th>Xếp loại</th>
        <th>Thao tác</th>
      </tr>
    </thead>
    <tbody id="studentTableBody"></tbody>
  </table>

  <div id="noResult">Không có kết quả</div>

  <script src="bai1-2.js"></script>
</body>
</html>
